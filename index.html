<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER SALAMI | রহস্যময় চ্যালেঞ্জ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Hind+Siliguri:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-overlay"></div>

<div class="main-frame">
    <div id="start-node" class="node active">
        <h1 class="cyber-title">SYSTEM <span>INITIALIZING...</span></h1>
        <p class="cyber-p">সালামি ডাটাবেজে প্রবেশ করতে আপনার নাম দিন।</p>
        <div class="cyber-input-wrap">
            <input type="text" id="userName" placeholder="ACCESS NAME" autocomplete="off">
        </div>
        <button class="cyber-btn" onclick="startSystem()">ENTER SYSTEM</button>
    </div>

    <div id="q1-node" class="node">
        <div class="scan-line"></div>
        <h2 class="q-text">আপনার প্রিয় খাবার কী?</h2>
        <input type="text" id="ans1" class="cyber-field" placeholder="টাইপ করুন...">
        <button class="next-btn" onclick="nextStep('q2-node')">NEXT >> </button>
    </div>

    <div id="q2-node" class="node">
        <div class="scan-line"></div>
        <h2 class="q-text">আপনার জন্ম কোন মাসে?</h2>
        <input type="text" id="ans2" class="cyber-field" placeholder="মাসের নাম...">
        <button class="next-btn" onclick="nextStep('q3-node')">NEXT >> </button>
    </div>

    <div id="q3-node" class="node">
        <div class="scan-line"></div>
        <h2 class="q-text">আমাকে আপনার কাছে কেমন মনে হয়?</h2>
        <textarea id="ans3" class="cyber-field" placeholder="সত্য কথা লিখুন..."></textarea>
        <button class="cyber-btn-gold" onclick="processResult()">CALCULATE MATCH</button>
    </div>

    <div id="result-node" class="node">
        <div class="glow-bg"></div>
        <h1 id="status-tag">ANALYSIS COMPLETE</h1>
        <div class="salami-display">
            <span class="tk-symbol">৳</span>
            <span id="final-cash">0</span>
        </div>
        <div id="final-msg" class="msg-box"></div>
        <button class="reboot-btn" onclick="location.reload()">REBOOT SYSTEM</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>

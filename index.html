<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EID SALAMI | দ্য আল্টিমেট চ্যালেঞ্জ</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="neon-circle"></div>
    <div class="neon-circle-2"></div>

    <div class="glass-card">
        <div id="setup-step" class="step active">
            <h1 class="glitch">EID SALAMI</h1>
            <p class="subtitle">সালামি পাওয়ার আগে প্রমাণ দাও তুমি আমাকে চেনো!</p>
            <div class="input-box">
                <input type="text" id="userName" required>
                <span>তোমার নাম লেখো</span>
            </div>
            <button class="next-btn" onclick="goToStep('step-1')">শুরু করি →</button>
        </div>

        <div id="step-1" class="step">
            <h2 class="q-title">১. আমার প্রিয় খাবার কী?</h2>
            <div class="input-box">
                <textarea id="ans1" placeholder="তোমার উত্তর টাইপ করো..."></textarea>
            </div>
            <button class="next-btn" onclick="goToStep('step-2')">পরের প্রশ্ন</button>
        </div>

        <div id="step-2" class="step">
            <h2 class="q-title">২. আমার জন্মদিন কোন মাসে?</h2>
            <div class="input-box">
                <input type="text" id="ans2" placeholder="মাসের নাম লেখো...">
            </div>
            <button class="next-btn" onclick="goToStep('step-3')">শেষ প্রশ্ন</button>
        </div>

        <div id="step-3" class="step">
            <h2 class="q-title">৩. আমাকে তোমার কেমন মনে হয়?</h2>
            <div class="input-box">
                <textarea id="ans3" placeholder="মন খুলে সত্যিটা লেখো..."></textarea>
            </div>
            <button class="finish-btn" onclick="calculateResult()">সালামি দাবি করুন 🧧</button>
        </div>

        <div id="result" class="step">
            <h1 class="congrats">ফলাফল!</h1>
            <h3 id="finalName"></h3>
            <div class="salami-box">
                <span class="currency">৳</span>
                <span id="amount" class="amount">০</span>
            </div>
            <div id="personal-note" class="personal-note">
                </div>
            <p class="instruction">স্ক্রিনশটটি আমাকে ইনবক্স করো আসল টাকা বুঝে নিতে!</p>
            <button class="share-btn" onclick="location.reload()">আবার চেষ্টা করো</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
